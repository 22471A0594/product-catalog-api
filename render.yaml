# Render Blueprint — deploy with `render blueprint apply`
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: product-catalog-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --workers 4 --bind 0.0.0.0:$PORT --timeout 120 --access-logfile -
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually to your Neon connection string
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /health
    autoDeploy: true
